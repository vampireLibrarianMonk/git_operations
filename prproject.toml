[tool.black]
line-length = 160
target-version = ["py39"]
skip-string-normalization = true

[tool.isort]
profile = "black"
line_length = 160
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true

[tool.flake8]
max-line-length = 160
ignore = ["SC100", "SC200"]
