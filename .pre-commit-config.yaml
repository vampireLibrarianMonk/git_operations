default_language_version:
  node: 20.11.1

exclude: (?x)^(
  /
  (
    scratch_pad|
    \.venv
  )/
  )

repos:
  # === FORMATTERS AND CODE CLEANERS ===

  # add-trailing-comma:
  # Adds trailing commas to multiline Python data structures.
  # Helpful for cleaner diffs and consistent formatting.
  # No config file required.
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v3.1.0
    hooks:
      - id: add-trailing-comma
        args: [--py36-plus]

  # black:
  # Opinionated Python code formatter.
  # Configured in: pyproject.toml
  # Example:
  # [tool.black]
  # line-length = 88
  # target-version = ["py39"]
  # skip-string-normalization = true
  - repo: https://github.com/psf/black
    rev: "24.4.2"
    hooks:
      - id: black
      - id: black-jupyter
        entry: black
        require_serial: true
        types_or: [python, pyi, jupyter]

  # codespell:
  # Catches common spelling errors in comments, docstrings, etc.
  # Optional config: .codespellrc
  # Example CLI args:
  # --skip="*.md,*.csv"
  # --ignore-words-list="teh,clas"
  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        entry: bash -c 'codespell "$@" || true' --
        verbose: true

  # isort:
  # Automatically organizes and sorts imports in Python files.
  # Configured in: pyproject.toml or .isort.cfg
  # Example (pyproject.toml):
  # [tool.isort]
  # profile = "black"
  # multi_line_output = 3
  # include_trailing_comma = true
  - repo: https://github.com/pycqa/isort
    rev: "5.13.2"
    hooks:
      - id: isort
        name: isort (python)

  # prettier:
  # Formats YAML, JSON, and Markdown files using Prettier.
  # Config file: .prettierrc or prettier.config.js
  # Example:
  # {
  #   "printWidth": 100,
  #   "tabWidth": 2,
  #   "singleQuote": true,
  #   "trailingComma": "es5"
  # }
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.1.0"
    hooks:
      - id: prettier
        files: .*\.(ya?ml|json|md)$
        exclude: (?x)^(
          .pre-commit-config.yaml|
          mkdocs.yml|
          .*.py
          )$

  # pre-commit-hooks:
  # Misc sanity checks (whitespace, merge conflicts, keys, etc).
  # No config needed.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-case-conflict
      - id: check-json
      # - id: check-yaml
      #   args: [--allow-multiple-documents]
      - id: check-merge-conflict
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

  # === PYTHON STATIC ANALYSIS ===

  # bandit:
  # Scans for Python security issues (e.g. eval, subprocess, etc).
  # Config: bandit.yaml
  # Example:
  # exclude: ["tests/", "docs/"]
  # skips: ["B101", "B403"]
  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.6"
    hooks:
      - id: bandit
        args: ["-x", "tests"]

  # detect-secrets:
  # Detects secrets like API keys or credentials in code.
  # Config: .secrets.baseline
  # Generate with:
  # detect-secrets scan > .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  # flake8:
  # Python linter enforcing style and catching issues.
  # Config: .flake8 or pyproject.toml
  # Example:
  # [flake8]
  # max-line-length = 88
  # ignore = ["E203", "W503"]
  - repo: https://github.com/pycqa/flake8
    rev: "7.0.0"
    hooks:
      - id: flake8
        entry: pflake8
        additional_dependencies: [pyproject-flake8]
